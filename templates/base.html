<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}DropCore{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    .status-active    { @apply bg-green-100 text-green-800; }
    .status-testing   { @apply bg-yellow-100 text-yellow-800; }
    .status-killed    { @apply bg-red-100 text-red-800; }
    .status-pending   { @apply bg-gray-100 text-gray-700; }
    .status-fulfilled { @apply bg-blue-100 text-blue-800; }
    .status-shipped   { @apply bg-indigo-100 text-indigo-800; }
    .status-delivered { @apply bg-green-100 text-green-800; }
    .status-refunded  { @apply bg-red-100 text-red-800; }
    .status-failed    { @apply bg-red-200 text-red-900; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">

  <!-- Sidebar -->
  <div class="flex h-screen overflow-hidden">
    <aside class="w-56 bg-gray-900 text-white flex flex-col flex-shrink-0">
      <div class="p-5 border-b border-gray-700">
        <span class="text-xl font-bold text-indigo-400">DropCore</span>
        <p class="text-xs text-gray-400 mt-1">AI Dropship Platform</p>
      </div>
      <nav class="flex-1 p-4 space-y-1">
        <a href="/dashboard" class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-gray-800 text-sm
          {% if request.path == '/dashboard' %}bg-gray-800 text-indigo-400{% else %}text-gray-300{% endif %}">
          📊 Dashboard
        </a>
        <a href="/dashboard/products" class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-gray-800 text-sm
          {% if '/products' in request.path %}bg-gray-800 text-indigo-400{% else %}text-gray-300{% endif %}">
          🛍️ Products
        </a>
        <a href="/dashboard/orders" class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-gray-800 text-sm
          {% if '/orders' in request.path %}bg-gray-800 text-indigo-400{% else %}text-gray-300{% endif %}">
          📦 Orders
        </a>
        <a href="/dashboard/agents" class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-gray-800 text-sm
          {% if '/agents' in request.path %}bg-gray-800 text-indigo-400{% else %}text-gray-300{% endif %}">
          🤖 Agents
        </a>
        <hr class="border-gray-700 my-3">
        <a href="/api/health" class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-gray-800 text-sm text-gray-400">
          🔌 API Status
        </a>
      </nav>
      <div class="p-4 text-xs text-gray-500 border-t border-gray-700">
        All free resources ✓<br>
        Demo mode: {{ config.DEMO_MODE }}
      </div>
    </aside>

    <!-- Main content -->
    <main class="flex-1 overflow-y-auto">
      <div class="p-8">
        {% block content %}{% endblock %}
      </div>
    </main>
  </div>

  {% block scripts %}{% endblock %}
</body>
</html>
